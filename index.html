const MAX_ROBOMINES_PER_PLAYER = 5; // how many live robo-mines each player may have out
const ROBOT_SPEED = 74;        // hunter-robot move speed (slower than tanks @138)
const ROBOT_TRIGGER_DIST = 22; // how close to an enemy before it explodes
const ROBOT_SEP_DIST = 36;     // robots push apart within this distance (no clumping)

// Who a robot owned by `owner` should hunt: AI in co-op, the enemy player in KoTH.
function robotTargets(owner) {
  if (mode === 'coop') return aiTanks.filter(a => !a.dead);
  return [myTank, oppTank].filter(t => t && !t.dead && t.playerNum !== owner);
}

function updateMines(dt) {
  mines.forEach(m => {
    if (!m.alive) return;
    if (m.vx === undefined) { m.vx = 0; m.vy = 0; m.angle = Math.random() * Math.PI * 2; }
    if (m.armTimer > 0) m.armTimer -= dt; // brief grace before it can explode

    // Steering: seek nearest enemy, or wander when there are none
    let targets = robotTargets(m.owner);
    let nearest = null, nd = Infinity;
    targets.forEach(t => { let d = dist(m.x, m.y, t.x, t.y); if (d < nd) { nd = d; nearest = t; } });

    let ax = 0, ay = 0;
    if (nearest) {
      let a = Math.atan2(nearest.y - m.y, nearest.x - m.x);
      ax += Math.cos(a); ay += Math.sin(a);
    } else {
      // No enemies: roam so the swarm spreads across the map
      if (m.wanderTimer === undefined || m.wanderTimer <= 0) {
        m.wanderAngle = Math.random() * Math.PI * 2;
        m.wanderTimer = 1.5 + Math.random() * 2;
      }
      m.wanderTimer -= dt;
      ax += Math.cos(m.wanderAngle) * 0.6; ay += Math.sin(m.wanderAngle) * 0.6;
    }

    // Separation — repel from nearby robots so they never clump
    mines.forEach(o => {
      if (o === m || !o.alive) return;
      let dx = m.x - o.x, dy = m.y - o.y, d = Math.hypot(dx, dy);
      if (d > 0.01 && d < ROBOT_SEP_DIST) {
        let f = (ROBOT_SEP_DIST - d) / ROBOT_SEP_DIST;
        ax += (dx / d) * f * 1.6; ay += (dy / d) * f * 1.6;
      }
    });

    // Apply heading and move (slide along walls like a tank)
    let len = Math.hypot(ax, ay);
    if (len > 0.001) {
      ax /= len; ay /= len;
      m.vx = ax * ROBOT_SPEED; m.vy = ay * ROBOT_SPEED;
      m.angle = Math.atan2(ay, ax);
    } else { m.vx = 0; m.vy = 0; }
    let nx = m.x + m.vx * dt, ny = m.y + m.vy * dt;
    if (!isWall(nx, m.y)) m.x = nx;
    if (!isWall(m.x, ny)) m.y = ny;
    m.x = Math.max(8, Math.min(W - 8, m.x));
    m.y = Math.max(8, Math.min(H - 8, m.y));

    // Detonate once it reaches an enemy
    if (m.armTimer <= 0 && nearest && nd < ROBOT_TRIGGER_DIST) detonateMine(m);
  });
  mines = mines.filter(m => m.alive);
}

function detonateMine(m) {
  m.alive = false;
  spawnExplosion(m.x, m.y, MINE_RADIUS, false);
  send({ type: 'mineExplode', id: m.id, x: m.x, y: m.y, owner: m.owner });
  // Damage everything in blast radius
  if (isHost) {
    aiTanks.filter(a => !a.dead).forEach(a => {
      if (dist(m.x, m.y, a.x, a.y) < MINE_RADIUS) {
        let wasDead = a.dead;
        a.takeDamage(MINE_DAMAGE);
        if (!wasDead && a.dead) {
          awardCoins(m.owner, aiReward(a));
          aiKillCount++;
          if (aiKillCount >= nextMedpackAt) {
            medpacks.push({ x: a.x, y: a.y, hp: 2, pulse: 0, alive: true, ttl: 10 });
            aiKillCount = 0;
            nextMedpackAt = 2 + Math.floor(Math.random() * 2);
          }
          if (mode === 'coop') onAIKilled();
        }
      }
    });
  }
  // Robo-mines hurt everyone — including the player who deployed them.
  [myTank, oppTank].filter(t => t && !t.dead).forEach(t => {
    if (dist(m.x, m.y, t.x, t.y) < MINE_RADIUS) t.takeDamage(MINE_DAMAGE);
  });
}

function drawMines(ctx) {
  mines.filter(m => m.alive).forEach(m => {
    let armed = m.armTimer <= 0;
    let ang = m.angle || 0;
    let blink = 0.5 + 0.5 * Math.sin(Date.now() * 0.012); // eye blink
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(ang);
    // Little legs (animated step)
    let step = Math.sin(Date.now() * 0.02) * 2;
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-3, 6); ctx.lineTo(-6, 9 + step); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3, 6); ctx.lineTo(6, 9 - step); ctx.stroke();
    // Body
    ctx.fillStyle = armed ? '#ff6600' : '#aa6633';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    // Antenna
    ctx.beginPath(); ctx.moveTo(0, -6); ctx.lineTo(0, -11); ctx.stroke();
    ctx.fillStyle = armed ? '#ff0000' : '#883300';
    ctx.beginPath(); ctx.arc(0, -12, 2, 0, Math.PI * 2); ctx.fill();
    // Eye (faces travel direction)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(3, 0, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = armed ? `rgba(255,0,0,${0.4 + blink * 0.6})` : '#446';
    ctx.beginPath(); ctx.arc(4, 0, 1.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

// ============================================================
// MAP DRAWING
// ============================================================
// AIRSTRIKE SYSTEM
// ============================================================
const AIRSTRIKE_PLANE_SPEED = 480; // px/s
const AIRSTRIKE_BOMB_COUNT  = 6;
const AIRSTRIKE_BOMB_SPREAD = 55;  // random offset from target center per bomb
const AIRSTRIKE_BOMB_RADIUS = 75;  // blast radius
const AIRSTRIKE_BOMB_DAMAGE = 3;
const AIRSTRIKE_FALL_TIME   = 0.5; // seconds bomb "falls" before detonating

function launchAirstrike(tx, ty, owner) {
  // Plane enters from the opposite side of the map relative to target
  let fromLeft = tx > W / 2;
  let px = fromLeft ? -60 : W + 60;
  let py = ty + (Math.random() - 0.5) * 80;
  let angle = Math.atan2(ty - py, tx - px);
  let vx = Math.cos(angle) * AIRSTRIKE_PLANE_SPEED;
  let vy = Math.sin(angle) * AIRSTRIKE_PLANE_SPEED;
  let id = Math.random().toString(36).slice(2);
  let as = { id, tx, ty, owner, delay: 1.5, px, py, vx, vy,
             active: false, done: false, passed: false,
             bombs: [], bombTimer: 0, bombsSpawned: 0 };
  airstrikes.push(as);
  // Tell the other client about this strike so they see the marker and plane
  send({ type: 'airstrikeLaunch', as: { id, tx, ty, owner, delay: as.delay, px, py, vx, vy } });
}

function updateAirstrikes(dt) {
  airstrikes.forEach(a => {
    if (a.done) return;
    if (!a.active) { a.delay -= dt; if (a.delay <= 0) a.active = true; return; }

    // Move plane
    a.px += a.vx * dt;
    a.py += a.vy * dt;

    // Drop bombs as it passes through the target zone
    if (!a.passed) {
      let d = dist(a.px, a.py, a.tx, a.ty);
      if (d < 220) {
        a.bombTimer -= dt;
        if (a.bombTimer <= 0 && a.bombsSpawned < AIRSTRIKE_BOMB_COUNT) {
          let bx = a.tx + (Math.random() - 0.5) * AIRSTRIKE_BOMB_SPREAD * 2;
          let by = a.ty + (Math.random() - 0.5) * AIRSTRIKE_BOMB_SPREAD * 2;
          a.bombs.push({ x: bx, y: by, timer: AIRSTRIKE_FALL_TIME, exploded: false });
          a.bombsSpawned++;
          a.bombTimer = 0.18;
        }
        if (a.bombsSpawned >= AIRSTRIKE_BOMB_COUNT) a.passed = true;
      }
    }

    // Detonate landed bombs — host applies AI+turret damage; each client damages its own tank
    a.bombs.forEach(b => {
      if (b.exploded) return;
      b.timer -= dt;
      if (b.timer <= 0) {
        b.exploded = true;
        spawnExplosion(b.x, b.y, AIRSTRIKE_BOMB_RADIUS, false);
        send({ type: 'airstrikeBomb', x: b.x, y: b.y }); // guest shows boom + self-damage
        // AI and turret damage (host only)
        if (isHost || isSolo) {
          aiTanks.filter(t => !t.dead).forEach(t => {
            if (dist(b.x, b.y, t.x, t.y) < AIRSTRIKE_BOMB_RADIUS) {
              let wasDead = t.dead;
              t.takeDamage(AIRSTRIKE_BOMB_DAMAGE);
              if (!wasDead && t.dead) {
                awardCoins(a.owner, aiReward(t));
                aiKillCount++;
                if (aiKillCount >= nextMedpackAt) {
                  medpacks.push({ x: t.x, y: t.y, hp: 2, pulse: 0, alive: true, ttl: 10 });
                  aiKillCount = 0; nextMedpackAt = 2 + Math.floor(Math.random() * 2);
                }
                if (mode === 'coop') onAIKilled();
              }
            }
          });
          turrets.filter(t => !t.dead).forEach(t => {
            if (dist(b.x, b.y, t.x, t.y) < AIRSTRIKE_BOMB_RADIUS) t.takeDamage(AIRSTRIKE_BOMB_DAMAGE);
          });
        }
        // Friendly fire — each client applies to its own tank
        if (myTank && !myTank.dead && dist(b.x, b.y, myTank.x, myTank.y) < AIRSTRIKE_BOMB_RADIUS)
          myTank.takeDamage(AIRSTRIKE_BOMB_DAMAGE);
      }
    });

    // Plane has left the map
    if (a.px < -120 || a.px > W + 120 || a.py < -120 || a.py > H + 120) {
      if (a.bombs.every(b => b.exploded)) a.done = true;
    }
  });
  airstrikes = airstrikes.filter(a => !a.done);
}

function drawAirstrikes(ctx) {
  airstrikes.forEach(a => {
    // Target crosshair (pulses while waiting, steady while active)
    if (!a.done) {
      let alpha = a.active ? 0.9 : 0.45 + 0.35 * Math.sin(Date.now() * 0.008);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#ff2020'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(a.tx, a.ty, 22, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(a.tx - 34, a.ty); ctx.lineTo(a.tx + 34, a.ty);
      ctx.moveTo(a.tx, a.ty - 34); ctx.lineTo(a.tx, a.ty + 34);
      ctx.stroke();
      ctx.fillStyle = '#ff2020'; ctx.font = 'bold 10px Courier New';
      ctx.textAlign = 'center'; ctx.fillText('AIR', a.tx, a.ty + 36);
      ctx.restore();
    }

    // Plane silhouette
    if (a.active && !a.done) {
      ctx.save();
      ctx.translate(a.px, a.py);
      ctx.rotate(Math.atan2(a.vy, a.vx));
      ctx.fillStyle = '#ccc';
      // Fuselage
      ctx.beginPath();
      ctx.moveTo(18, 0); ctx.lineTo(-14, -5); ctx.lineTo(-10, 0); ctx.lineTo(-14, 5);
      ctx.closePath(); ctx.fill();
      // Wings
      ctx.fillRect(-6, -16, 10, 32);
      // Tail
      ctx.fillRect(-14, -8, 6, 5);
      ctx.fillRect(-14, 3, 6, 5);
      ctx.restore();
    }

    // Falling bombs + impact rings
    a.bombs.forEach(b => {
      if (b.exploded) return;
      let progress = 1 - b.timer / AIRSTRIKE_FALL_TIME;
      ctx.save();
      // Shrinking warning ring (visible before impact)
      ctx.globalAlpha = 0.25 * (1 - progress);
      ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(b.x, b.y, AIRSTRIKE_BOMB_RADIUS * (1 - progress * 0.4), 0, Math.PI * 2); ctx.stroke();
      // Bomb dot growing as it falls
      ctx.globalAlpha = 0.7 + progress * 0.3;
      ctx.fillStyle = '#ff3300';
      ctx.beginPath(); ctx.arc(b.x, b.y, 3 + progress * 6, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    });
  });
}

// ============================================================
const offCanvas = document.createElement('canvas');
offCanvas.width = W; offCanvas.height = H;
let mapDrawn = false;

function drawMap(ctx) {
  if (!mapDrawn) {
    let oc = offCanvas.getContext('2d');
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        let t = mapData[r][c];
        let x = c * TILE, y = r * TILE;
        if (t === GRASS) {
          oc.fillStyle = (r+c)%2===0 ? '#3a5c2a' : '#2e4f20';
          oc.fillRect(x, y, TILE, TILE);
        } else if (t === WALL) {
          oc.fillStyle = '#555';
          oc.fillRect(x, y, TILE, TILE);
          oc.fillStyle = '#777';
          oc.fillRect(x, y, TILE, 4);
        } else if (t === SWAMP) {
          oc.fillStyle = '#1e3b1e';
          oc.fillRect(x, y, TILE, TILE);
          oc.fillStyle = '#2a5a3a';
          for (let i = 0; i < 3; i++) {
            oc.beginPath();
            oc.arc(x + TILE*0.2 + i*TILE*0.3, y + TILE/2, 3, 0, Math.PI*2);
            oc.fill();
          }
        } else if (t === HAZARD) {
          oc.fillStyle = '#5a1515';
          oc.fillRect(x, y, TILE, TILE);
          oc.fillStyle = '#7a2020';
          oc.fillRect(x+2, y+2, TILE-4, TILE-4);
        }
      }
    }
    mapDrawn = true;
  }
  ctx.drawImage(offCanvas, 0, 0);
}

function updateHUD() {
  // HP dots
  function renderHP(id, tank, color) {
    let el = document.getElementById(id);
    if (!el) return;
    el.innerHTML = '';
    for (let i = 0; i < 10; i++) {
      let dot = document.createElement('div');
      dot.className = 'hp-dot ' + (tank && i < tank.hp ? 'full' : 'empty');
      dot.style.background = color;
      el.appendChild(dot);
    }
  }
  renderHP('p1HP', myTank, P1_COLOR);
  renderHP('p2HP', oppTank, P2_COLOR);

  // Badges
  function renderBadges(id, tank) {
    let el = document.getElementById(id);
    if (!el || !tank) return;
    el.innerHTML = '';
    if (tank.shieldHp > 0) { let s=document.createElement('span'); s.className='status-badge shield'; s.title='Armor'; el.appendChild(s); }
    if (tank.speedBoost > 0) { let s=document.createElement('span'); s.className='status-badge speed'; s.title='Speed'; el.appendChild(s); }
  }
  renderBadges('p1Badges', myTank);
  renderBadges('p2Badges', oppTank);

  // KOTH timer
  let kothEl = document.getElementById('kothTimer');
  let waveEl = document.getElementById('waveInfo');
  if (mode === 'koth') {
    kothEl.style.display = 'block'; waveEl.style.display = 'none';
    let f = t => `${Math.floor(t/60)}:${String(Math.floor(t%60)).padStart(2,'0')}`;
    let tot = `${f(KOTH_WIN_TIME)}`;
    kothEl.textContent = `You ${f(koth.p1Time)} / ${tot} / Opp ${f(koth.p2Time)}`;
  } else {
    kothEl.style.display = 'none'; waveEl.style.display = 'block';
    let st = Math.floor(surviveTime || gameTime || 0);
    let aliveAI = aiTanks.filter(a => !a.dead).length;
    let remaining = levelEnemiesTotal - levelEnemiesKilled;
    let myLives = myTank ? myTank.lives : 0;
    let oppLives = oppTank ? oppTank.lives : 0;
    let livesStr = `❤${myLives} / ❤${oppLives}`;
    if (levelPhase === 'shop') {
      waveEl.textContent = `Level ${level} CLEAR! | Shop: ${Math.ceil(shopTimer)}s | 💰 ${coins} | ${livesStr}`;
    } else if (levelPhase === 'boss') {
      waveEl.textContent = `Level ${level} BOSS | 💰 ${coins} | ${livesStr}`;
    } else {
      waveEl.textContent = `Level ${level} | Enemies: ${remaining} left | 💰 ${coins} | ${livesStr}`;
    }
  }

  // Weapon bar
  let wb = document.getElementById('weaponBar');
  wb.innerHTML = '';
  if (myTank) {
    WEAPONS.forEach(w => {
      let slot = document.createElement('div');
      slot.className = 'weapon-slot' + (myTank.activeWeapon === w ? ' active' : '');
      let ammo = myTank.ammo[w];
      let ammoStr = ammo === Infinity ? '∞' : ammo;
      let coolStr = '';
      if (w === 'laser' && myTank.laserCooldown > 0) coolStr = `<div class="wcool">${myTank.laserCooldown.toFixed(1)}s</div>`;
      slot.innerHTML = `<div class="wname">${WEAPON_NAMES[w]}</div><div class="wammo">${ammoStr}</div>${coolStr}`;
      wb.appendChild(slot);
    });
  }

  // Keep shop coin display updated
  if (mode === 'coop') {
    let cd = document.getElementById('coinDisplay');
    if (cd) cd.textContent = coins + ' coins';
  }
}

// ============================================================
// GAME INIT
// ============================================================
function startGame() {
  if (isHost) {
    mapData = generateMap();
    koth = { x: W/2, y: H/2, timer: 0, p1Time: 0, p2Time: 0, moveTimer: 0, flash: 0 };
    spawnPickups();
    // Send start data to guest
    send({ type: 'start', map: mapData, pickups, koth, mode });
    initGame(true);
  }
  // Guest waits for 'start' packet
}

function initGame(hosting) {
  mapDrawn = false;
  explosions = []; bullets = []; aiBullets = []; aiTanks = []; medpacks = []; turrets = []; turretBullets = []; playerWalls = []; mines = []; airstrikes = []; aiHitIds.clear();
  waveNum = 0; waveTimer = 0; aiSpawnTimer = 5; aiSpawnInterval = 8; surviveTime = 0; gameTime = 0; gameOverShown = false;
  aiKillCount = 0; nextMedpackAt = 2 + Math.floor(Math.random() * 2);
  level = 0; levelEnemiesTotal = 0; levelEnemiesSpawned = 0; levelEnemiesKilled = 0;
  levelPhase = 'fight'; shopTimer = 0; coins = 0; oppCoins = 0; placingTurret = null;

  // Player bases: host=bottom-left, guest=top-right
  let p1x = TILE*2 + TILE/2, p1y = H - TILE*3;
  let p2x = W - TILE*3, p2y = TILE*2 + TILE/2;

  myTank = new Tank(p1x, p1y, P1_COLOR, 1);
  myTank.baseX = p1x; myTank.baseY = p1y;

  oppTank = new Tank(p2x, p2y, P2_COLOR, 2);
  oppTank.baseX = p2x; oppTank.baseY = p2y;

  if (!hosting) {
    // Guest swaps: guest is P2 visually but "my" tank
    [myTank.color, oppTank.color] = [P2_COLOR, P1_COLOR];
    myTank.x = p2x; myTank.y = p2y; myTank.baseX = p2x; myTank.baseY = p2y;
    myTank.angle = Math.PI;
    oppTank.x = p1x; oppTank.y = p1y; oppTank.baseX = p1x; oppTank.baseY = p1y;
    myTank.playerNum = 2; oppTank.playerNum = 1;
  }

  // Solo: no opponent tank exists at all
  if (isSolo) oppTank = null;

  if (hosting && mode === 'coop') startNextLevel();

  document.getElementById('lobby').style.display = 'none';
  document.getElementById('gameContainer').style.display = 'flex';
  document.getElementById('p2Hud').style.display = isSolo ? 'none' : 'flex';
  document.getElementById('gameOver').style.display = 'none';
  gameRunning = true;
  lastTimestamp = 0;
  requestAnimationFrame(gameLoop);
}

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(ts) {
  if (!gameRunning) return;
  animId = requestAnimationFrame(gameLoop);
  let dt = Math.min((ts - (lastTimestamp || ts)) / 1000, 0.05);
  lastTimestamp = ts;
  gameTime += dt;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  // Input — arrow keys for movement, mouse for aiming
  if (myTank) {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
    if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
    if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
    myTank.move(dt, dx, dy);
    // Aim turret at mouse
    let rect = canvas.getBoundingClientRect();
    let lx = mouseX - rect.left, ly = mouseY - rect.top;
    myTank.turretAngle = Math.atan2(ly - myTank.y, lx - myTank.x);
    // Hold-to-fire: stream while the mouse is held (cooldown gates each weapon's rate).
    // Skipped during turret/wall placement so clicks place instead of shoot.
    if (mouseDown && !placingTurret) myTank.fire(lx, ly);
  }

  // KoTH
  if (isHost) updateKoth(dt);

  // Pickups
  if (isHost) updatePickups(dt);

  // Level system (host only, Co-op)
  if (isHost && mode === 'coop') {
    surviveTime += dt;
    if (levelPhase === 'fight' || levelPhase === 'boss') {
      // Spawn enemies for this level (not during boss phase)
      if (levelPhase === 'fight' && levelEnemiesSpawned < levelEnemiesTotal) {
        aiSpawnTimer -= dt;
        if (aiSpawnTimer <= 0) { aiSpawnTimer = aiSpawnInterval; spawnOneAI(); }
      }
      aiTanks.forEach(a => a.updateAI(dt));
      aiTanks = aiTanks.filter(a => !a.dead);
      aiBullets.forEach(b => b.update(dt));
      aiBullets = aiBullets.filter(b => b.alive);
    } else if (levelPhase === 'shop') {
      shopTimer -= dt;
      if (shopTimer <= 0) { startNextLevel(); }
    }
  }

  // Turrets (both host and guest update visuals, host does damage)
  if (mode === 'coop') {
    if (isHost) updateTurrets(dt);
    else { turretBullets.forEach(b => b.update(dt)); turretBullets = turretBullets.filter(b => b.alive); }
  }

  // Bullets
  bullets.forEach(b => b.update(dt));
  bullets = bullets.filter(b => b.alive);

  // Collisions
  checkBulletHits(dt);

  // Explosions
  updateExplosions(dt);

  // Medpacks
  updateMedpacks(dt);
  if (isHost) updateMines(dt);
  updateAirstrikes(dt);

  // Network send
  if (myTank) {
    let myBullets = bullets.filter(b => b.owner === myTank.playerNum);
    send({
      type: 'input',
      x: myTank.x, y: myTank.y, angle: myTank.angle, turretAngle: myTank.turretAngle,
      hp: myTank.hp, shieldHp: myTank.shieldHp, speedBoost: myTank.speedBoost,
      dead: myTank.dead, respawnTimer: myTank.respawnTimer, lives: myTank.lives,
      bullets: myBullets.map(b => ({x:b.x,y:b.y,vx:b.vx,vy:b.vy,type:b.type,owner:b.owner,laserBeam:b.laserBeam,age:b.age,id:b.id,life:b.life}))
    });
    if (isHost) {
      send({
        type: 'state',
        ai: aiTanks.map(a => ({x:a.x,y:a.y,angle:a.angle,turretAngle:a.turretAngle,hp:a.hp,dead:a.dead,id:a.id,color:a.color,tankType:a.tankType})),
        koth: koth, pickups: pickups, medpacks: medpacks, wave: waveNum, surviveTime,
        level, levelPhase, shopTimer, p1Coins: coins, p2Coins: oppCoins,
        levelEnemiesTotal, levelEnemiesKilled,
        turrets: turrets.map(t => ({x:t.x,y:t.y,type:t.type,level:t.level,id:t.id,turretAngle:t.turretAngle,range:t.range,damage:t.damage,fireRate:t.fireRate,color:t.color,hp:t.hp,maxHp:t.maxHp,dead:t.dead,isLaserCannon:t.isLaserCannon||false,placedBy:t.placedBy})),
        turretBullets: turretBullets.map(b => ({x:b.x,y:b.y,vx:b.vx,vy:b.vy,type:b.type,owner:b.owner})),
        playerWalls: playerWalls.map(w => ({col:w.col,row:w.row,hp:w.hp,maxHp:w.maxHp,id:w.id})),
        mines: mines.filter(m => m.alive).map(m => ({x:m.x,y:m.y,owner:m.owner,alive:true,armTimer:m.armTimer,id:m.id,angle:m.angle||0})),
        aiBullets: aiBullets.map(b=>({x:b.x,y:b.y,vx:b.vx,vy:b.vy,type:b.type,owner:b.owner,id:b.id,bulletDamage:b.bulletDamage||1})),
        explosions: explosions.map(e=>({...e}))
      });
    }
  }

  // DRAW
  drawMap(ctx);
  drawKoth(ctx);
  drawPickups(ctx);
  drawMedpacks(ctx);
  drawMines(ctx);
  drawAirstrikes(ctx);
  drawTurrets(ctx);
  drawPlayerWalls(ctx);
  drawExplosions(ctx);
  // Placement ghost
  if (placingTurret && mode === 'coop') {
    let rect = canvas.getBoundingClientRect();
    let gx = mouseX - rect.left, gy = mouseY - rect.top;
    if (placingTurret === 'wall') {
      let col = Math.floor(gx / TILE), row = Math.floor(gy / TILE);
      ctx.save(); ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#5dade2';
      ctx.fillRect(col * TILE, row * TILE, TILE, TILE);
      ctx.restore();
    } else {
      let def = TURRET_TYPES[placingTurret];
      ctx.save(); ctx.globalAlpha = 0.4;
      ctx.fillStyle = def.color;
      ctx.beginPath(); ctx.arc(gx, gy, def.range, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 0.7;
      ctx.fillStyle = '#333'; ctx.fillRect(gx - 12, gy - 12, 24, 24);
      ctx.fillStyle = def.color; ctx.fillRect(gx - 10, gy - 10, 20, 20);
      ctx.restore();
    }
  }
  // AI tanks
  aiTanks.filter(a => !a.dead).forEach(a => a.draw(ctx));
  // Bullets
  [...bullets, ...aiBullets].forEach(b => b.draw(ctx));
  // Players
  if (oppTank) oppTank.draw(ctx);
  if (myTank) myTank.draw(ctx);

  // Draw respawn timers on bases
  if (myTank && myTank.dead) {
    ctx.save(); ctx.fillStyle='#f1c40f'; ctx.font='bold 16px Courier New'; ctx.textAlign='center';
    if (myTank.lives > 0) {
      ctx.fillText(`Respawn: ${Math.ceil(myTank.respawnTimer)}s`, myTank.baseX, myTank.baseY - 30);
      ctx.fillText(`Lives: ${myTank.lives}`, myTank.baseX, myTank.baseY - 10);
    } else {
      ctx.fillStyle = '#e74c3c';
      ctx.fillText('ELIMINATED', myTank.baseX, myTank.baseY - 20);
    }
    ctx.restore();
  }
  if (oppTank && oppTank.dead) {
    ctx.save(); ctx.font='bold 14px Courier New'; ctx.textAlign='center';
    if (oppTank.lives > 0) {
      ctx.fillStyle='#f1c40f';
      ctx.fillText(`Lives: ${oppTank.lives}`, oppTank.baseX, oppTank.baseY - 10);
    } else {
      ctx.fillStyle = '#e74c3c';
      ctx.fillText('ELIMINATED', oppTank.baseX, oppTank.baseY - 20);
    }
    ctx.restore();
  }

  updateHUD();
}

// ============================================================
// INPUT
// ============================================================
document.addEventListener('keydown', e => {
  keys[e.key] = true; keys[e.code] = true;
  if (e.key === ' ' || e.key.startsWith('Arrow')) e.preventDefault();
  if (e.key === 'Escape' && placingTurret) { placingTurret = null; updateShopUI(); }
  if ((e.key === 'b' || e.key === 'B') && mode === 'coop' && gameRunning) { updateShopUI(); }
  // Number keys 1–7 select a weapon directly
  if (gameRunning && myTank && e.key >= '1' && e.key <= '9') {
    let idx = parseInt(e.key, 10) - 1;
    if (idx < WEAPONS.length) myTank.activeWeapon = WEAPONS[idx];
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; keys[e.code] = false; });
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.getElementById('canvas').addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
document.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });

// Fire on click (or place/upgrade turret)
document.getElementById('canvas').addEventListener('click', e => {
  if (!gameRunning) return;
  let rect = e.target.getBoundingClientRect();
  let cx = e.clientX - rect.left, cy = e.clientY - rect.top;
  // Wall or turret placement/upgrade
  if (mode === 'coop' && placingTurret === 'wall') {
    if (tryPlaceWall(cx, cy)) return;
  }
  if (mode === 'coop' && placingTurret && placingTurret !== 'wall') {
    if (tryPlaceTurret(cx, cy)) return;
  }
  if (mode === 'coop' && !placingTurret) {
    if (tryUpgradeTurret(cx, cy)) return;
  }
  // Normal fire
  if (myTank) myTank.fire(cx, cy);
});

// Cycle weapon on right click
document.getElementById('canvas').addEventListener('contextmenu', e => {
  e.preventDefault();
  if (myTank && gameRunning) myTank.cycleWeapon();
});

// Prevent context menu everywhere
document.addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// GAME OVER
// ============================================================
function showGameOver(title, msg) {
  if (gameOverShown) return;
  gameOverShown = true;
  gameRunning = false;
  cancelAnimationFrame(animId);
  document.getElementById('goTitle').textContent = title;
  document.getElementById('goMsg').textContent = msg;
  document.getElementById('gameOver').style.display = 'flex';
}

function backToLobby() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  if (conn) { try { conn.close(); } catch(e) {} conn = null; }
  if (peer) { try { peer.destroy(); } catch(e) {} peer = null; }
  mapData = []; pickups = []; explosions = []; bullets = []; aiBullets = []; aiTanks = []; turrets = []; turretBullets = []; medpacks = [];
  myTank = null; oppTank = null; mapDrawn = false; gameOverShown = false; placingTurret = null; isSolo = false;
  document.getElementById('shopBar').style.display = 'none';
  koth = { x: W/2, y: H/2, timer: 0, p1Time: 0, p2Time: 0, moveTimer: 0, flash: 0 };
  document.getElementById('hostCode').textContent = '----';
  document.getElementById('hostStatus').textContent = 'Click Host to generate a code';
  document.getElementById('joinStatus').textContent = 'Enter the host\'s 4-digit code';
  document.getElementById('joinCode').value = '';
  document.getElementById('gameContainer').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  // Clear canvas
  let canvas = document.getElementById('canvas');
  let ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, W, H);
}

// ============================================================
// HELPERS
// ============================================================
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

// Fix AiTank.move referencing Tank.move properly for wall collision
AiTank.prototype.move = Tank.prototype.move;

// Fix AI: filter properly
const _aiUpdate = AiTank.prototype.updateAI;
AiTank.prototype.updateAI = function(dt) {
  if (this.dead) return;
  _aiUpdate.call(this, dt);
};

</script>
